services:
  postgres:
    image: postgres:17-alpine
    container_name: heyetodo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: heyetodo
      POSTGRES_USER: heyetodo
      POSTGRES_PASSWORD: heyetodo
    ports:
      - "0427:5432"
    volumes:
      - heyetodo-postgres-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heyetodo -d heyetodo"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ..
      dockerfile: src/HeyeTodo.Server/Dockerfile
    container_name: heyetodo-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=heyetodo;Username=heyetodo;Password=heyetodo
      # MUST be replaced with at least 32 random bytes before deploying.
      Jwt__Issuer: HeyeTodo
      Jwt__Audience: HeyeTodo.Client
      Jwt__SigningKey: change-this-in-production-please-32bytes-minimum
      Jwt__AccessTokenMinutes: 30
      Jwt__RefreshTokenDays: 30
      # Example browser origins for a self-hosted deployment:
      # Cors__AllowedOrigins__0: https://heyetodo.example.com
      # Cors__AllowedOrigins__1: https://app.heyetodo.example.com
    ports:
      - "8080:8080"

volumes:
  heyetodo-postgres-dev-data:
