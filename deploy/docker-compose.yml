services:
  postgres:
    image: postgres:17-alpine
    container_name: gamertodo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gamertodo
      POSTGRES_USER: gamertodo
      POSTGRES_PASSWORD: gamertodo
    ports:
      - "0427:5432"
    volumes:
      - gamertodo-postgres-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gamertodo -d gamertodo"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ..
      dockerfile: src/GamerTodo.Server/Dockerfile
    container_name: gamertodo-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=gamertodo;Username=gamertodo;Password=gamertodo
      # MUST be replaced with at least 32 random bytes before deploying.
      Jwt__Issuer: GamerTodo
      Jwt__Audience: GamerTodo.Client
      Jwt__SigningKey: change-this-in-production-please-32bytes-minimum
      Jwt__AccessTokenMinutes: 30
      Jwt__RefreshTokenDays: 30
      # Example browser origins for a self-hosted deployment:
      # Cors__AllowedOrigins__0: https://gamertodo.example.com
      # Cors__AllowedOrigins__1: https://app.gamertodo.example.com
    ports:
      - "8080:8080"

volumes:
  gamertodo-postgres-dev-data:
